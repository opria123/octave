<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A0B2E"/>
      <stop offset="100%" stop-color="#5B127C"/>
    </linearGradient>
    
    <linearGradient id="waveGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F2FE"/>
      <stop offset="100%" stop-color="#4FACFE"/>
    </linearGradient>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="512" height="512" rx="115" fill="url(#bgGrad)"/>
  
  <g fill="url(#waveGrad)">
    <rect x="152" y="216" width="28" height="80" rx="14" />
    <rect x="196" y="166" width="28" height="180" rx="14" />
    <rect x="240" y="116" width="28" height="280" rx="14" />
    <rect x="284" y="146" width="28" height="220" rx="14" />
    <rect x="328" y="196" width="28" height="120" rx="14" />
  </g>
  
  <circle cx="254" cy="256" r="140" fill="none" stroke="#FFFFFF" stroke-width="24" stroke-opacity="0.9" filter="url(#glow)"/>
</svg>
