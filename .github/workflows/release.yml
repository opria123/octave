name: Build & Release

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  # Bump version and create a git tag on every push to master
  tag:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine next version
        id: bump
        run: |
          # Get latest tag, default to v0.0.0 if none exists
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1)
          if [ -z "$LATEST" ]; then
            LATEST="v0.0.0"
          fi
          echo "Latest tag: $LATEST"

          # Parse version parts
          MAJOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f1)
          MINOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f2)
          PATCH=$(echo "$LATEST" | sed 's/v//' | cut -d. -f3)

          # Check commit messages since last tag for version bump hints
          if [ "$LATEST" = "v0.0.0" ]; then
            COMMITS=$(git log --oneline)
          else
            COMMITS=$(git log ${LATEST}..HEAD --oneline)
          fi

          if echo "$COMMITS" | grep -qiE 'BREAKING CHANGE|^[a-z]+!:'; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif echo "$COMMITS" | grep -qiE '^feat'; then
            MINOR=$((MINOR + 1)); PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          TAG="v${VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Next version: $TAG"

      - name: Update package.json version
        run: |
          npm version ${{ steps.bump.outputs.version }} --no-git-tag-version

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "release: ${{ steps.bump.outputs.tag }}" || true
          git tag ${{ steps.bump.outputs.tag }}
          git push origin master --tags

  build:
    needs: tag
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Package (${{ matrix.platform }})
        run: npx electron-builder --${{ matrix.platform }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.platform }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.deb
            dist/*.zip
            dist/*.blockmap
            dist/latest*.yml
          if-no-files-found: warn

  release:
    needs: [tag, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          # Get the previous tag
          CURRENT="${{ needs.tag.outputs.tag }}"
          PREV=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | grep -v "^${CURRENT}$" | head -n1)
          if [ -z "$PREV" ]; then
            COMMITS=$(git log --pretty=format:'- %s' "$CURRENT")
          else
            COMMITS=$(git log --pretty=format:'- %s' "${PREV}..${CURRENT}" | grep -v '^- release:')
          fi

          # Write to file to preserve newlines
          echo "$COMMITS" > /tmp/commits.txt
          echo "Generated changelog with $(echo "$COMMITS" | wc -l) commits"

      - name: Build release body
        run: |
          COMMITS=$(cat /tmp/commits.txt)
          {
            echo "## OCTAVE ${{ needs.tag.outputs.tag }}"
            echo ""
            echo "### What's Changed"
            echo "$COMMITS"
            echo ""
            echo "### Downloads"
            echo "- **Windows**: \`.exe\` installer (with \`.blockmap\` for differential updates)"
            echo "- **macOS**: \`.dmg\` disk image"
            echo "- **Linux**: \`.AppImage\`"
            echo ""
            echo "On first launch OCTAVE downloads a self-contained Python runtime (~1.5 GB) into your user-data folder. The runtime survives app updates and is shared across versions."
            echo ""
            echo "---"
            echo "*Built automatically from \`master\`*"
          } > /tmp/release-body.md
          cat /tmp/release-body.md

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f 2>/dev/null || ls -R artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.tag }}
          name: OCTAVE ${{ needs.tag.outputs.tag }}
          body_path: /tmp/release-body.md
          files: artifacts/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
