name: Build & Release (Beta)

# Pre-release pipeline. Pushing to the `beta` branch (or running this
# workflow manually) builds all three platforms and publishes a GitHub
# *pre-release* tagged vX.Y.Z-beta.N. Only users who opt in via
# Settings -> Updates -> "Receive beta (pre-release) updates"
# (autoUpdater.allowPrerelease) auto-download these builds. Because
# `1.2.3-beta.1` sorts BELOW `1.2.3` in semver, beta testers automatically
# roll forward onto the matching stable release once you merge `beta` into
# `master`.

on:
  push:
    branches: [beta]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Same native-binary gate as the stable release (see release.yml). A beta
  # build that bumps DEMUCS_CPP_BIN_VERSION / WHISPER_CPP_BIN_VERSION must not
  # reach even beta testers before the matching tarballs are published, or
  # their stem separation / vocals charting would hard-fail. Re-run this
  # workflow once the binary builds finish.
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: beta

      - name: Verify native binary assets are published
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          DEMUCS_VER=$(grep -oE "DEMUCS_CPP_BIN_VERSION = '[^']+'" src/main/strumIntegration/demucsCppBootstrap.ts | grep -oE "'[^']+'" | tr -d "'")
          WHISPER_VER=$(grep -oE "WHISPER_CPP_BIN_VERSION = '[^']+'" src/main/strumIntegration/whisperCppBootstrap.ts | grep -oE "'[^']+'" | tr -d "'")
          echo "Pinned versions -> demucs v${DEMUCS_VER}, whisper v${WHISPER_VER}"

          DEMUCS_ASSETS=$(gh release view demucs-cpp-cache --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' 2>/dev/null || true)
          WHISPER_ASSETS=$(gh release view whisper-cpp-cache --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' 2>/dev/null || true)

          MISSING=()
          require() {
            local have="$1"; local name="$2"
            if ! printf '%s\n' "$have" | grep -qx "$name"; then
              MISSING+=("$name")
            fi
          }

          for t in win32-x64 darwin-arm64 linux-x64; do
            require "$DEMUCS_ASSETS" "demucs-cpp-bin-${t}-v${DEMUCS_VER}.tar.gz"
          done

          for t in win32-x64 darwin-arm64 linux-x64; do
            require "$WHISPER_ASSETS" "whisper-cpp-bin-${t}-cpu-v${WHISPER_VER}.tar.gz"
          done
          require "$WHISPER_ASSETS" "whisper-cpp-bin-win32-x64-cuda-v${WHISPER_VER}.tar.gz"

          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::Refusing to publish beta: native binary assets for the pinned versions are not on the cache releases yet. Wait for the demucs-cpp / whisper-cpp binary workflows to finish, then re-run this workflow."
            printf '  missing: %s\n' "${MISSING[@]}"
            exit 1
          fi

          echo "All required native binary assets are published. Safe to release beta."

  # Compute the next beta version and create a pre-release git tag.
  tag:
    needs: preflight
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: beta

      - name: Determine next beta version
        id: bump
        run: |
          # Latest STABLE tag (strict vX.Y.Z, ignores -beta tags) is the base
          # we bump from, using the same feat/BREAKING heuristic as master.
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1)
          if [ -z "$LATEST" ]; then
            LATEST="v0.0.0"
          fi
          echo "Latest stable tag: $LATEST"

          MAJOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f1)
          MINOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f2)
          PATCH=$(echo "$LATEST" | sed 's/v//' | cut -d. -f3)

          if [ "$LATEST" = "v0.0.0" ]; then
            COMMITS=$(git log --oneline)
          else
            COMMITS=$(git log ${LATEST}..HEAD --oneline)
          fi

          if echo "$COMMITS" | grep -qiE 'BREAKING CHANGE|^[a-z]+!:'; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif echo "$COMMITS" | grep -qiE '^feat'; then
            MINOR=$((MINOR + 1)); PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          BASE="${MAJOR}.${MINOR}.${PATCH}"

          # Increment the beta iteration for this base version. e.g. if
          # v1.2.0-beta.2 exists we publish v1.2.0-beta.3.
          LAST_BETA=$(git tag --sort=-v:refname | grep -E "^v${BASE}-beta\.[0-9]+$" | head -n1)
          if [ -z "$LAST_BETA" ]; then
            N=1
          else
            LAST_N=$(echo "$LAST_BETA" | sed -E "s/^v${BASE}-beta\.//")
            N=$((LAST_N + 1))
          fi

          VERSION="${BASE}-beta.${N}"
          TAG="v${VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Next beta version: $TAG"

      - name: Update package.json version
        run: |
          npm version ${{ steps.bump.outputs.version }} --no-git-tag-version

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Bake the beta version into package.json on a throwaway commit and
          # tag THAT commit. We push only the tag, never the beta branch, so
          # the branch keeps a clean history with no version churn and merging
          # beta -> master later can't conflict on package.json. The build job
          # checks out the tag, so it still picks up the correct version.
          git add package.json package-lock.json
          git commit -m "release: ${{ steps.bump.outputs.tag }}" || true
          git tag ${{ steps.bump.outputs.tag }}
          git push origin ${{ steps.bump.outputs.tag }}

  build:
    needs: tag
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Package (${{ matrix.platform }})
        run: npx electron-builder --${{ matrix.platform }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.platform }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.deb
            dist/*.zip
            dist/*.blockmap
            dist/latest*.yml
          if-no-files-found: warn

  release:
    needs: [tag, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: beta

      - name: Generate changelog
        id: changelog
        run: |
          CURRENT="${{ needs.tag.outputs.tag }}"
          # Diff against the previous beta OR stable tag, whichever is newest.
          PREV=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+(-beta\.[0-9]+)?$' | grep -v "^${CURRENT}$" | head -n1 || true)
          if [ -z "$PREV" ]; then
            COMMITS=$(git log --pretty=format:'- %s' "$CURRENT" || true)
          else
            COMMITS=$(git log --pretty=format:'- %s' "${PREV}..${CURRENT}" | { grep -v '^- release:' || true; })
          fi
          if [ -z "$COMMITS" ]; then
            COMMITS="- Maintenance beta (no user-facing changes)"
          fi
          echo "$COMMITS" > /tmp/commits.txt
          echo "Generated changelog with $(echo "$COMMITS" | wc -l) commits"

      - name: Build release body
        run: |
          COMMITS=$(cat /tmp/commits.txt)
          {
            echo "## OCTAVE ${{ needs.tag.outputs.tag }} (Beta)"
            echo ""
            echo "> ⚠️ **Pre-release build for testing.** Enable it in OCTAVE via **Settings → Updates → Receive beta (pre-release) updates**, or download an installer below. Beta testers automatically move to the matching stable release once it ships."
            echo ""
            echo "### What's Changed"
            echo "$COMMITS"
            echo ""
            echo "### Downloads"
            echo "- **Windows**: \`.exe\` installer (with \`.blockmap\` for differential updates)"
            echo "- **macOS**: \`.dmg\` disk image"
            echo "- **Linux**: \`.AppImage\`"
            echo ""
            echo "On first launch OCTAVE downloads a self-contained Python runtime (~1.5 GB) into your user-data folder. The runtime survives app updates and is shared across versions."
            echo ""
            echo "---"
            echo "*Built automatically from \`beta\`*"
          } > /tmp/release-body.md
          cat /tmp/release-body.md

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f 2>/dev/null || ls -R artifacts

      - name: Create GitHub Pre-Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.tag }}
          name: OCTAVE ${{ needs.tag.outputs.tag }} (Beta)
          body_path: /tmp/release-body.md
          files: artifacts/*
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
