appId: com.opria123.octave
productName: OCTAVE
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/strum/**
  # ffmpeg-static ships a binary that must be executable on disk; asar-packed
  # binaries cannot be exec'd directly, so unpack it. STRUM's Whisper /
  # demucs / yt-dlp shell out to this ffmpeg via PATH.
  - node_modules/ffmpeg-static/**
extraResources:
  - from: resources/strum
    to: resources/strum
win:
  executableName: octave
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
  # Differential updates: electron-updater downloads only the changed blocks
  # of the installer instead of the full ~150 MB binary on every patch
  # release. Now safe to enable since we no longer bundle Python (the runtime
  # lives in userData, outside the installer), so installer churn is small.
  differentialPackage: true
  # Custom NSIS hooks force-kill any leftover OCTAVE.exe / bundled python.exe
  # instances before install so auto-update doesn't fail with
  # "OCTAVE cannot be closed".
  include: build/installer.nsh
mac:
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  identity: null
  target:
    - dmg
    - zip
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  target:
    - AppImage
  maintainer: opria123
  category: AudioVideo
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
afterPack: scripts/afterPack.js
publish:
  provider: github
  owner: opria123
  repo: octave
